name: Extract Metal API

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Resolve SDK environment
        run: |
          SDK_PATH=$(xcrun --show-sdk-path)
          SDK_VERSION=$(xcrun --show-sdk-version)
          DEPLOY_TARGET="macos$(echo "$SDK_VERSION" | cut -d. -f1).0"
          echo "SDK_PATH=$SDK_PATH"       >> "$GITHUB_ENV"
          echo "SDK_VERSION=$SDK_VERSION" >> "$GITHUB_ENV"
          echo "DEPLOY_TARGET=$DEPLOY_TARGET" >> "$GITHUB_ENV"
          echo "Xcode: $(xcodebuild -version | head -1), SDK: $SDK_VERSION, Target: $DEPLOY_TARGET"

      - name: Dump Clang AST
        run: |
          TEMP_HEADER=$(mktemp /tmp/metal_XXXXXX.h)
          cat > "$TEMP_HEADER" <<'HEADER'
          #import <Metal/Metal.h>
          #if __has_include(<MetalFX/MetalFX.h>)
          #import <MetalFX/MetalFX.h>
          #endif
          HEADER

          xcrun clang \
            -Xclang -ast-dump=json \
            -fsyntax-only \
            -x objective-c \
            -isysroot "$SDK_PATH" \
            -target "arm64-apple-${DEPLOY_TARGET}" \
            -std=gnu17 \
            -Wno-everything \
            "$TEMP_HEADER" \
            2>/dev/null \
            > /tmp/metal_raw_ast.json
          rm -f "$TEMP_HEADER"
          echo "Raw AST size: $(du -h /tmp/metal_raw_ast.json | cut -f1)"

      - name: Dump Swift Symbol Graphs
        run: |
          mkdir -p /tmp/symbolgraph
          for fw in Metal MetalFX; do
            xcrun swift-symbolgraph-extract \
              -module-name "$fw" \
              -target "arm64-apple-${DEPLOY_TARGET}" \
              -sdk "$SDK_PATH" \
              -output-dir /tmp/symbolgraph \
              2>/dev/null || echo "Warning: could not extract $fw symbol graph"
          done
          echo "Symbol graphs: $(ls /tmp/symbolgraph/*.symbols.json 2>/dev/null | wc -l | tr -d ' ') files"

      - name: Extract Metal API
        run: |
          python3 .github/scripts/parse_metal_ast.py \
            /tmp/metal_raw_ast.json \
            Metal.NET.Generator/metal-ast.json \
            "$SDK_VERSION" \
            "$SDK_PATH" \
            /tmp/symbolgraph

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Metal.NET.Generator/metal-ast.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update metal-ast.json (SDK $SDK_VERSION)"
          git push

