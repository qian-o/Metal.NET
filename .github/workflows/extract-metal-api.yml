name: Extract Metal API

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Print environment
        run: |
          xcodebuild -version
          echo "SDK: $(xcrun --show-sdk-path)"
          echo "SDK version: $(xcrun --show-sdk-version)"

      - name: Dump Clang AST
        run: |
          SDK_PATH=$(xcrun --show-sdk-path)
          SDK_VERSION=$(xcrun --show-sdk-version)
          DEPLOY_TARGET="macos$(echo $SDK_VERSION | cut -d. -f1).0"
          TEMP_HEADER=$(mktemp /tmp/metal_XXXXXX.h)

          cat > "$TEMP_HEADER" <<'HEADER'
          #import <Metal/Metal.h>
          #import <Foundation/Foundation.h>
          #import <QuartzCore/QuartzCore.h>
          #if __has_include(<MetalFX/MetalFX.h>)
          #import <MetalFX/MetalFX.h>
          #endif
          HEADER

          echo "Clang AST dump (target: $DEPLOY_TARGET)..."
          xcrun clang \
            -Xclang -ast-dump=json \
            -fsyntax-only \
            -x objective-c \
            -isysroot "$SDK_PATH" \
            -target "arm64-apple-${DEPLOY_TARGET}" \
            -std=gnu17 \
            -Wno-everything \
            "$TEMP_HEADER" \
            2>/dev/null \
            > /tmp/metal_raw_ast.json
          rm -f "$TEMP_HEADER"
          echo "Raw AST: $(du -h /tmp/metal_raw_ast.json | cut -f1)"

      - name: Extract Metal API
        run: |
          SDK_PATH=$(xcrun --show-sdk-path)
          SDK_VERSION=$(xcrun --show-sdk-version)
          python3 .github/scripts/extract_metal_api.py \
            /tmp/metal_raw_ast.json \
            Metal.NET.Generator/metal-ast.json \
            "$SDK_VERSION" \
            "$SDK_PATH"

      - name: Commit changes
        run: |
          SDK_VERSION=$(xcrun --show-sdk-version)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Metal.NET.Generator/metal-ast.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update metal-ast.json (SDK $SDK_VERSION)"
          git push

